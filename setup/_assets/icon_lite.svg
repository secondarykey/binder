<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- ノート表面グラデーション -->
    <linearGradient id="note-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>
    <!-- ノート側面（影） -->
    <linearGradient id="note-side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#C8C8C8"/>
    </linearGradient>
    <!-- ラベル（黄緑） -->
    <linearGradient id="label-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8E86C"/>
      <stop offset="100%" stop-color="#6BBF3A"/>
    </linearGradient>
    <!-- 影フィルター -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="5" stdDeviation="8" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ノート2冊 -->
  <g filter="url(#shadow)">
    <!-- ノート1（左、少し後ろ） -->
    <g transform="translate(90, 50)">
      <rect x="8" y="8" width="140" height="400" rx="8" fill="url(#note-side)"/>
      <rect width="140" height="400" rx="8" fill="url(#note-face)"/>
      <rect x="20" y="45" width="100" height="32" rx="4" fill="url(#label-grad)"/>
      <rect x="20" y="95" width="100" height="32" rx="4" fill="url(#label-grad)"/>
      <circle cx="70" cy="330" r="22" fill="#B0B0B0" stroke="#999" stroke-width="2"/>
      <circle cx="70" cy="330" r="12" fill="url(#note-face)"/>
    </g>

    <!-- ノート2（右、少し傾き、手前） -->
    <g transform="translate(260, 40) rotate(10, 70, 210)">
      <rect x="8" y="8" width="140" height="410" rx="8" fill="url(#note-side)"/>
      <rect width="140" height="410" rx="8" fill="url(#note-face)"/>
      <rect x="20" y="45" width="100" height="32" rx="4" fill="url(#label-grad)"/>
      <rect x="20" y="95" width="100" height="32" rx="4" fill="url(#label-grad)"/>
      <circle cx="70" cy="340" r="22" fill="#B0B0B0" stroke="#999" stroke-width="2"/>
      <circle cx="70" cy="340" r="12" fill="url(#note-face)"/>
    </g>
  </g>
</svg>
