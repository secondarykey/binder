<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景グラデーション（緑系） -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4EC6A0"/>
      <stop offset="100%" stop-color="#1A7A5A"/>
    </linearGradient>
    <!-- バインダー表面 -->
    <linearGradient id="binder-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#D0D0D0"/>
    </linearGradient>
    <!-- バインダー側面 -->
    <linearGradient id="binder-side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#C8C8C8"/>
    </linearGradient>
    <!-- ラベル -->
    <linearGradient id="label-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6DD8B0"/>
      <stop offset="100%" stop-color="#38A87E"/>
    </linearGradient>
    <!-- 光沢 -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- 鉛筆グラデーション -->
    <linearGradient id="pencil-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F7C948"/>
      <stop offset="100%" stop-color="#E5A820"/>
    </linearGradient>
    <!-- 影 -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 角丸背景 -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- 光沢 -->
  <rect width="512" height="260" rx="100" ry="100" fill="url(#shine)"/>

  <!-- バインダー1つ（中央、大きめ） -->
  <g filter="url(#shadow)">
    <g transform="translate(140, 60)">
      <!-- 側面 -->
      <rect x="8" y="8" width="130" height="380" rx="10" fill="url(#binder-side)"/>
      <!-- 表面 -->
      <rect width="130" height="380" rx="10" fill="url(#binder-face)"/>
      <!-- ラベル上 -->
      <rect x="18" y="45" width="94" height="35" rx="5" fill="url(#label-grad)"/>
      <!-- ラベル下 -->
      <rect x="18" y="98" width="94" height="35" rx="5" fill="url(#label-grad)"/>
      <!-- 穴 -->
      <circle cx="65" cy="310" r="22" fill="#B0B0B0" stroke="#999" stroke-width="2"/>
      <circle cx="65" cy="310" r="12" fill="url(#binder-face)"/>
    </g>
  </g>

  <!-- 鉛筆（右下に斜めに配置） -->
  <g filter="url(#shadow)" transform="translate(300, 280) rotate(-45)">
    <!-- 本体 -->
    <rect x="0" y="-10" width="140" height="20" rx="2" fill="url(#pencil-body)"/>
    <!-- 芯側 -->
    <polygon points="0,-10 0,10 -18,0" fill="#333"/>
    <!-- 芯先 -->
    <polygon points="-8,-4 -8,4 -18,0" fill="#F5F0E0"/>
    <!-- 消しゴム側 -->
    <rect x="140" y="-10" width="25" height="20" rx="2" fill="#E88B8B"/>
    <!-- 金具 -->
    <rect x="135" y="-11" width="8" height="22" fill="#C0A030"/>
    <!-- 本体ストライプ -->
    <rect x="30" y="-10" width="3" height="20" fill="rgba(0,0,0,0.08)"/>
    <rect x="60" y="-10" width="3" height="20" fill="rgba(0,0,0,0.08)"/>
    <rect x="90" y="-10" width="3" height="20" fill="rgba(0,0,0,0.08)"/>
    <rect x="120" y="-10" width="3" height="20" fill="rgba(0,0,0,0.08)"/>
  </g>
</svg>
