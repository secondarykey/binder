version: '3'

info:
  companyName: "secondarykey"
  productName: "Binder Lite"
  productIdentifier: "com.github.secondarykey.binder-lite"
  description: "A lightweight Markdown editor with preview"
  copyright: "(c)2026, secondarykey"
  homepage: "https://github.com/secondarykey/binder"
  comments: "Binder Lite - Lightweight Markdown Editor"
  version: "0.12.1"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - build
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.jsx"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
