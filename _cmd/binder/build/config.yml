version: '3'

info:
  companyName: "secondarykey"
  productName: "Binder"
  productIdentifier: "com.github.secondarykey.binder"
  description: "A desktop Markdown editor for technical documents"
  copyright: "(c)2026, secondarykey"
  # NOTE: wails3 update build-assets overwrites nfpm.yaml homepage with "https://wails.io".
  # If you change this value, also update build/linux/nfpm/nfpm.yaml manually.
  homepage: "https://github.com/secondarykey/binder"
  comments: "Binder - Markdown Editor"
  version: "0.10.5"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - build
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.jsx"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
other:
  - name: My Other Data
