name: VersionUp

on:
  pull_request:
    branches: [ "main" ]
    types: [ closed ]

env:

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  versionup:

    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Determine and Bump Version
        id: versioning
        run: |

          BASE_VERSION=$(cat _cmd/binder/version | xargs)
          if ! git rev-parse "v$BASE_VERSION" >/dev/null 2>&1; then
            FINAL_VERSION="$BASE_VERSION"
          else
            PREFIX=${BASE_VERSION%.*}
            PATCH=${BASE_VERSION##*.}
            NEXT_PATCH=$((PATCH + 1))
            FINAL_VERSION="${PREFIX}.${NEXT_PATCH}"
          fi

          go run _cmd/version.go $FINAL_VERSION

          echo "NEW_VERSION=$FINAL_VERSION" >> $GITHUB_ENV

      - name: Commit and Tag
        run: |
          # ユーザー設定
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "chore: version ${{env.NEW_VERSION}}"
          git push

          NEW_TAG="v${{env.NEW_VERSION}}" 

          git tag $NEW_TAG
          git push origin $NEW_TAG
