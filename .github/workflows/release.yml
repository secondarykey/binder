name: Multi-OS Build

on:
  push:
    tags:
      - 'v*'
env:

  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    if: |
      contains(github.ref, 'refs/tags/v') && 
      !contains(github.ref, '-') && 
      !contains(github.ref, '+') 
    # 実行するOSの指定（matrixを参照）
    runs-on: ${{ matrix.os }}

    # 実際の実行手順
    steps:

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Get Go Env
        shell: bash
        run: |
          echo "GOOS=$(go env GOOS)" >> $GITHUB_ENV
          echo "GOARCH=$(go env GOARCH)" >> $GITHUB_ENV
          echo "APP_NAME=binder" >> $GITHUB_ENV
          echo "VERSION=$(cat _cmd/binder/version | xargs)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Display version
        run: |
          go version
          go env GOOS GOARCH
          node -v
          npm -v

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Wails doctor
        run: |
          wails3 version
          wails3 doctor

      - name: Build or Package (Binder)
        working-directory: ./_cmd/binder
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            wails3 package
          else
            wails3 build
          fi

      - name: Build or Package (Binder Lite)
        working-directory: ./_cmd/lite
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            wails3 package
          else
            wails3 build
          fi

      - name: Archive Build Results
        shell: bash
        run: |
          export GOOS=$(go env GOOS)
          export GOARCH=$(go env GOARCH)
          export ZIP_NAME="binder-${VERSION}_${GOOS}_${GOARCH}.zip"

          # 一時ディレクトリに成果物を集約
          mkdir -p _archive
          cp -r ./_cmd/binder/bin/* _archive/
          cp -r ./_cmd/lite/bin/* _archive/

          cd _archive
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../${ZIP_NAME} ./*
          else
            zip -r ../${ZIP_NAME} ./*
          fi
          echo "ZIP_PATH=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.os }}-asset
          path: ${{ env.ZIP_PATH }}

  release:

    needs: build

    # タグがプッシュされた時（かつ記号を含まない時）のみ実行
    if: |
      success() &&
      startsWith(github.ref, 'refs/tags/v') && 
      !contains(github.ref, '-') && 
      !contains(github.ref, '+')
    runs-on: ubuntu-latest
    permissions:
      contents: write # リリースを作成するために書き込み権限が必要

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v5
      with:
        path: ./all-zips
        merge-multiple: true

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ github.ref_name }}
        files: ./all-zips/*.zip
        generate_release_notes: true
        draft: true
        prerelease: false

